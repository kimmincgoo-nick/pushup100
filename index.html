<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Push-Ups Program</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a26;
  --bg4: #22222f;
  --text: #e8e8f0;
  --text2: #9898a8;
  --text3: #606070;
  --accent: #ff6b35;
  --accent2: #ff8c5a;
  --active: #4a8eff;
  --active2: #6aa4ff;
  --done: #2ecc71;
  --done2: #4ae68a;
  --danger: #e74c3c;
  --border: #2a2a3a;
  --border2: #3a3a4a;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

.header {
  text-align: center;
  padding: 32px 0 24px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 3px;
  background: var(--accent); border-radius: 2px;
}
.header h1 {
  font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--active));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.header p { font-size: 13px; color: var(--text2); }

/* ===== STAT GRID 2x2 ===== */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 24px 0 16px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  text-align: center;
}
.stat-card .label {
  font-size: 11px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
}
.stat-card .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 600; color: var(--accent);
}
.stat-card .value.blue { color: var(--active); }
.stat-card .value.green { color: var(--done); }
.stat-card .sub-text {
  font-size: 12px; color: var(--done); margin-top: 4px; font-weight: 600;
}
.stat-card .sub-text.muted {
  color: var(--text3); font-weight: 400;
}

.initial-input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 600;
  background: transparent; border: none;
  border-bottom: 2px dashed var(--border2);
  color: var(--active); text-align: center;
  width: 70px; outline: none; padding: 2px 0;
  -moz-appearance: textfield; transition: border-color 0.2s;
}
.initial-input:focus { border-bottom-color: var(--active); border-bottom-style: solid; }
.initial-input::-webkit-inner-spin-button,
.initial-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.initial-input::placeholder { color: var(--text3); font-size: 16px; }

/* ===== PROGRESS ===== */
.progress-wrap {
  margin: 0 0 24px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.progress-wrap .label {
  font-size: 12px; color: var(--text2); margin-bottom: 8px;
  display: flex; justify-content: space-between;
}
.progress-bar {
  width: 100%; height: 8px;
  background: var(--bg4); border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--done));
  border-radius: 4px; transition: width 0.5s ease;
}

.section-title {
  font-size: 14px; font-weight: 600; color: var(--text2);
  margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
}

/* ===== WEEK TABS ===== */
.week-tabs {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 6px; margin-bottom: 12px;
}
.week-tab {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 4px;
  color: var(--text2); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.week-tab:hover { border-color: var(--active); color: var(--text); }
.week-tab.active { background: var(--active); border-color: var(--active); color: #fff; }
.week-tab.done { background: rgba(46,204,113,0.15); border-color: var(--done); color: var(--done); }
.week-tab.done.active { background: var(--done); color: #fff; }

/* ===== DAY TABS ===== */
.day-tabs {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 20px;
}
.day-tab {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 8px;
  color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.day-tab:hover { border-color: var(--active); color: var(--text); }
.day-tab.active { background: var(--active); border-color: var(--active); color: #fff; }
.day-tab.done { background: rgba(46,204,113,0.15); border-color: var(--done); color: var(--done); }
.day-tab.done.active { background: var(--done); color: #fff; }

/* ===== WORKOUT CARD ===== */
.workout-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
}
.workout-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
}
.workout-title { font-size: 16px; font-weight: 600; }
.rest-badge {
  font-size: 11px; color: var(--text3);
  background: var(--bg4); padding: 4px 10px; border-radius: 20px;
}

.sets-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.set-item { text-align: center; }
.set-label {
  font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500;
}
.set-target {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 600; color: var(--accent); margin-bottom: 6px;
}
.set-target.max-label { color: var(--danger); font-size: 14px; }

/* Set toggle button (Sets 1-4) */
.set-toggle {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 4px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 500;
  text-align: center;
  cursor: pointer; transition: all 0.2s;
  outline: none;
}
.set-toggle:hover { border-color: var(--active); color: var(--text2); }
.set-toggle.done {
  border-color: var(--done); background: rgba(46,204,113,0.08); color: var(--done);
}

/* Set input (Set 5 MAX) */
.set-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 4px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 500;
  text-align: center; outline: none; transition: all 0.2s;
}
.set-input:focus { border-color: var(--active); box-shadow: 0 0 0 3px rgba(74,142,255,0.15); }
.set-input.has-value { border-color: var(--done); background: rgba(46,204,113,0.08); color: var(--done); }
.set-input::placeholder { color: var(--text3); font-size: 12px; }
.set-input::-webkit-inner-spin-button,
.set-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.set-input { -moz-appearance: textfield; }

.memo-area {
  width: 100%; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px; color: var(--text);
  font-family: 'Space Grotesk', sans-serif; font-size: 14px;
  resize: vertical; min-height: 60px; outline: none; transition: border-color 0.2s;
}
.memo-area:focus { border-color: var(--active); }
.memo-area::placeholder { color: var(--text3); }

.btn-row { display: flex; gap: 10px; margin-top: 16px; }
.btn {
  flex: 1; padding: 14px; border: none; border-radius: var(--radius-sm);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg4); color: var(--text); }
.btn-done { background: var(--done); color: #fff; }
.btn-sm { padding: 10px 16px; font-size: 13px; flex: unset; }

.history-section { margin-top: 32px; }
.history-item {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center; font-size: 13px;
}
.history-item .date { color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.history-item .info { color: var(--text2); }
.history-item .info strong { color: var(--text); }
.history-item .total { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--done); color: #fff;
  padding: 12px 24px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; z-index: 999;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 24px rgba(46,204,113,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 480px) {
  .sets-grid { gap: 6px; }
  .set-toggle { padding: 8px 2px; font-size: 14px; }
  .set-input { padding: 8px 2px; font-size: 14px; }
  .set-target { font-size: 16px; }
  .stat-grid { gap: 6px; }
  .stat-card { padding: 12px 10px; }
  .stat-card .value { font-size: 20px; }
  .initial-input { font-size: 20px; width: 60px; }
}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="header">
    <h1>100 Push-Ups</h1>
    <p>USNA 6-Week Program by CAPT Mike Prevost, USN</p>
  </div>

  <!-- Stat Grid 2x2 -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="label">진행 주차</div>
      <div class="value blue" id="stat-week">0/6</div>
    </div>
    <div class="stat-card">
      <div class="label">누적 푸쉬업</div>
      <div class="value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="label">최초 측정</div>
      <div>
        <input type="number" class="initial-input" id="initial-input"
          placeholder="?" min="0" inputmode="numeric"
          onchange="updateInitialMax(this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">
        <span style="font-size:13px;color:var(--text3)">개</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="label">추정 최대</div>
      <div class="value green" id="stat-estimated">-</div>
      <div class="sub-text muted" id="stat-delta"></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="label">
      <span>6주 프로그램 진행률</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="section-title">주차 선택</div>
  <div class="week-tabs" id="week-tabs"></div>
  <div class="day-tabs" id="day-tabs"></div>

  <div class="workout-card" id="workout-card" style="display:none;">
    <div class="workout-header">
      <div class="workout-title" id="workout-title">Week 1 · Day 1</div>
      <div class="rest-badge">세트 간 휴식 30-60초</div>
    </div>
    <div class="sets-grid" id="sets-grid"></div>
    <textarea class="memo-area" id="memo" placeholder="오늘의 컨디션, 특이사항 메모..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-save" onclick="saveWorkout()">저장</button>
      <button class="btn btn-done" id="btn-complete" onclick="completeDay()" style="display:none;">Day 완료</button>
    </div>
  </div>

  <div class="empty-state" id="empty-state">
    최초 측정 푸쉬업 개수를 입력하면 프로그램이 시작됩니다
  </div>

  <div class="history-section">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>기록</span>
      <button class="btn btn-secondary btn-sm" onclick="exportCSV()">CSV 내보내기</button>
    </div>
    <div id="history-list" style="margin-top:12px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== PROGRAM DATA =====
// 3 phases, each with 3 columns
const PHASE_COLS = [
  ['< 6', '6-10', '11-20'],
  ['21-25', '26-35', '36-50'],
  ['50-75', '75-100', '> 100']
];

const PHASE_BOUNDS = [
  [[0,5],[6,10],[11,999]],
  [[0,25],[26,35],[36,999]],
  [[0,75],[76,100],[101,999]]
];

// PROGRAM[week][day] = [set1, set2, set3, set4, null]
// Each set = [col0_val, col1_val, col2_val] or null for MAX
const PROGRAM = [
  // Week 1 (Phase 0: <6, 6-10, 11-20)
  [
    [[2,6,10],[3,6,12],[2,4,7],[2,4,7],null],
    [[3,6,10],[4,8,12],[2,6,8],[3,6,8],null],
    [[4,8,11],[5,10,15],[4,7,9],[4,7,9],null],
  ],
  // Week 2 (Phase 0)
  [
    [[4,8,12],[6,10,15],[5,8,10],[4,8,10],null],
    [[5,8,12],[7,11,16],[5,8,10],[4,8,10],null],
    [[5,8,12],[8,12,17],[6,8,11],[5,8,10],null],
  ],
  // Week 3 (Phase 1: 21-25, 26-35, 36-50)
  [
    [[12,14,25],[17,18,30],[13,14,25],[13,14,25],null],
    [[13,15,26],[18,19,31],[14,15,26],[14,15,26],null],
    [[14,16,27],[19,20,32],[15,16,27],[15,16,27],null],
  ],
  // Week 4 (Phase 1)
  [
    [[15,17,28],[20,21,33],[16,17,28],[16,17,28],null],
    [[16,18,29],[21,22,34],[17,18,29],[17,18,29],null],
    [[17,19,30],[22,23,35],[18,19,30],[18,19,30],null],
  ],
  // Week 5 (Phase 2: 50-75, 75-100, >100)
  [
    [[35,45,55],[40,55,65],[30,35,35],[24,30,30],null],
    [[36,46,56],[41,56,66],[31,36,36],[25,31,31],null],
    [[37,47,57],[42,57,67],[32,37,37],[26,32,32],null],
  ],
  // Week 6 (Phase 2)
  [
    [[38,48,58],[43,58,68],[33,38,38],[27,33,33],null],
    [[39,49,59],[44,59,69],[34,39,39],[28,34,34],null],
    [[40,50,60],[45,60,70],[35,40,40],[29,35,35],null],
  ],
];

const DAY_LABELS = ['Day 1', 'Day 2', 'Day 3'];

// ===== STATE =====
let state = loadState();

function defaultState() {
  return {
    initialMax: null,
    weekIdx: 0,
    dayIdx: 0,
    completedDays: {},
    history: [],
    currentSets: [null,null,null,null,null],
    currentMemo: '',
    weekEstimates: {}
  };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('pushup100_v4'));
    if (s && s.history !== undefined) {
      if (!s.weekEstimates) s.weekEstimates = {};
      if (s.initialMax === undefined) s.initialMax = null;
      return s;
    }
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem('pushup100_v4', JSON.stringify(state));
}

function getCompletedDays(weekIdx) {
  return state.completedDays[weekIdx] || [];
}

function isWeekComplete(weekIdx) {
  return getCompletedDays(weekIdx).length >= 3;
}

function countCompletedWeeks() {
  let c = 0;
  for (let w = 0; w < 6; w++) if (isWeekComplete(w)) c++;
  return c;
}

// ===== PHASE & COLUMN =====
function getPhase(weekIdx) {
  return Math.floor(weekIdx / 2);
}

function getColInPhase(max, phase) {
  if (max === null) return -1;
  const bounds = PHASE_BOUNDS[phase];
  for (let i = 0; i < bounds.length; i++) {
    if (max >= bounds[i][0] && max <= bounds[i][1]) return i;
  }
  return 2; // highest column
}

function getMaxForWeek(weekIdx) {
  if (state.initialMax === null) return null;
  let runningMax = state.initialMax;
  for (let w = 0; w < weekIdx; w++) {
    const est = state.weekEstimates[w];
    if (est !== undefined && est > runningMax) runningMax = est;
  }
  return runningMax;
}

function getColIdxForWeek(weekIdx) {
  const max = getMaxForWeek(weekIdx);
  return getColInPhase(max, getPhase(weekIdx));
}

function getColLabelForWeek(weekIdx) {
  const ci = getColIdxForWeek(weekIdx);
  if (ci < 0) return '';
  return PHASE_COLS[getPhase(weekIdx)][ci];
}

// ===== ESTIMATION =====
function estimateFromSets(sets) {
  if (!sets || sets.length < 5) return null;
  const s5 = sets[4];
  const priorVol = sets[0] + sets[1] + sets[2] + sets[3];
  if (s5 === 0 && priorVol === 0) return null;
  return Math.round(s5 + priorVol * 0.3);
}

function calcWeekEstimate(weekIdx) {
  if (!isWeekComplete(weekIdx)) return null;
  const weekHistory = state.history.filter(h => h.weekIdx === weekIdx && h.completed);
  if (weekHistory.length < 3) return null;
  let maxEst = 0;
  for (const h of weekHistory) {
    const est = estimateFromSets(h.sets);
    if (est !== null && est > maxEst) maxEst = est;
  }
  return maxEst > 0 ? maxEst : null;
}

function recalcAllEstimates() {
  for (let w = 0; w < 6; w++) {
    if (isWeekComplete(w)) {
      const est = calcWeekEstimate(w);
      if (est !== null) state.weekEstimates[w] = est;
    }
  }
}

function getCurrentEstimatedMax() {
  if (state.initialMax === null) return null;
  let runningMax = state.initialMax;
  for (let w = 0; w < 6; w++) {
    const est = state.weekEstimates[w];
    if (est !== undefined && est > runningMax) runningMax = est;
  }
  return runningMax;
}

// ===== WORKOUT DATA =====
function getDayData(weekIdx, dayIdx, colIdx) {
  const day = PROGRAM[weekIdx][dayIdx];
  return day.map(set => {
    if (set === null) return null; // MAX
    return set[colIdx];
  });
}

// ===== RENDER =====
function render() {
  renderStats();
  renderWeekTabs();
  renderDayTabs();
  renderWorkout();
  renderProgress();
  renderHistory();
}

function renderStats() {
  document.getElementById('stat-week').textContent = `Week ${state.weekIdx + 1}`;

  const totalPushups = state.history.reduce((sum, h) => sum + (h.total || 0), 0);
  document.getElementById('stat-total').textContent = totalPushups.toLocaleString();

  const input = document.getElementById('initial-input');
  if (state.initialMax !== null && input !== document.activeElement) {
    input.value = state.initialMax;
  }

  const estEl = document.getElementById('stat-estimated');
  const deltaEl = document.getElementById('stat-delta');
  const estimated = getCurrentEstimatedMax();
  const hasCompletedWeek = Object.keys(state.weekEstimates).length > 0;

  if (estimated !== null && hasCompletedWeek) {
    estEl.textContent = estimated;
    if (state.initialMax !== null && estimated > state.initialMax) {
      deltaEl.className = 'sub-text';
      deltaEl.textContent = `최초 대비 +${estimated - state.initialMax}개`;
    } else {
      deltaEl.className = 'sub-text muted';
      deltaEl.textContent = '';
    }
  } else if (state.initialMax !== null) {
    estEl.textContent = state.initialMax;
    deltaEl.className = 'sub-text muted';
    deltaEl.textContent = 'Week 1 측정이 완료되면 계산됩니다';
  } else {
    estEl.textContent = '-';
    deltaEl.className = 'sub-text muted';
    deltaEl.textContent = '';
  }
}

function renderWeekTabs() {
  const el = document.getElementById('week-tabs');
  if (state.initialMax === null) { el.innerHTML = ''; return; }
  el.innerHTML = Array.from({length:6}, (_, i) => {
    let cls = 'week-tab';
    if (isWeekComplete(i)) cls += ' done';
    if (i === state.weekIdx) cls += ' active';
    const colLabel = getColLabelForWeek(i);
    return `<button class="${cls}" onclick="selectWeek(${i})">
      <div>W${i+1}</div>
      <div style="font-size:10px;opacity:0.7;margin-top:2px">${colLabel}</div>
    </button>`;
  }).join('');
}

function renderDayTabs() {
  const el = document.getElementById('day-tabs');
  if (state.initialMax === null) { el.innerHTML = ''; return; }
  const days = getCompletedDays(state.weekIdx);
  el.innerHTML = DAY_LABELS.map((label, i) => {
    let cls = 'day-tab';
    if (days.includes(i)) cls += ' done';
    if (i === state.dayIdx) cls += ' active';
    return `<button class="${cls}" onclick="selectDay(${i})">${label}</button>`;
  }).join('');
}

function renderWorkout() {
  const card = document.getElementById('workout-card');
  const empty = document.getElementById('empty-state');
  const colIdx = getColIdxForWeek(state.weekIdx);

  if (state.initialMax === null || colIdx < 0) {
    card.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  card.style.display = 'block';
  empty.style.display = 'none';

  const phase = getPhase(state.weekIdx);
  const colLabel = PHASE_COLS[phase][colIdx];
  document.getElementById('workout-title').textContent =
    `Week ${state.weekIdx+1} · ${DAY_LABELS[state.dayIdx]} · ${colLabel}`;

  const targets = getDayData(state.weekIdx, state.dayIdx, colIdx);
  const grid = document.getElementById('sets-grid');

  grid.innerHTML = targets.map((target, s) => {
    const isMax = target === null;
    const val = state.currentSets[s];

    if (isMax) {
      // Set 5: number input
      const hasVal = val !== null && val !== '' && val !== 0;
      return `
        <div class="set-item">
          <div class="set-label">Set ${s+1}</div>
          <div class="set-target max-label">MAX</div>
          <input type="number" class="set-input${hasVal ? ' has-value' : ''}"
            value="${hasVal ? val : ''}"
            placeholder="MAX" min="0" inputmode="numeric"
            oninput="updateSet(${s}, this.value)">
        </div>`;
    } else {
      // Sets 1-4: toggle button
      const isDone = val !== null && val !== '' && val !== 0;
      return `
        <div class="set-item">
          <div class="set-label">Set ${s+1}</div>
          <div class="set-target">${target}</div>
          <button class="set-toggle${isDone ? ' done' : ''}"
            onclick="toggleSet(${s}, ${target})">완료</button>
        </div>`;
    }
  }).join('');

  document.getElementById('memo').value = state.currentMemo || '';

  const allFilled = state.currentSets.every(v => v !== null && v !== '' && v !== 0);
  const isDayDone = getCompletedDays(state.weekIdx).includes(state.dayIdx);
  document.getElementById('btn-complete').style.display = (allFilled && !isDayDone) ? 'block' : 'none';
  document.getElementById('btn-save').textContent = isDayDone ? '수정 저장' : '저장';
}

function renderProgress() {
  let total = 0;
  for (let w = 0; w < 6; w++) total += getCompletedDays(w).length;
  const pct = Math.min(100, Math.round(total / 18 * 100));
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (state.history.length === 0) {
    el.innerHTML = '<div class="empty-state">아직 기록이 없습니다</div>';
    return;
  }
  el.innerHTML = [...state.history].reverse().slice(0, 20).map(h => {
    const sets = h.sets.map((v,i) => i === 4 ? `<strong style="color:var(--danger)">${v}</strong>` : v).join(' · ');
    const colLabel = h.colLabel || '';
    return `
      <div class="history-item">
        <div>
          <div class="info"><strong>${colLabel}</strong> · W${h.weekIdx+1} ${DAY_LABELS[h.dayIdx]}</div>
          <div class="date">${h.date}</div>
        </div>
        <div style="text-align:right">
          <div class="total">${h.total}회</div>
          <div style="font-size:11px;color:var(--text3)">${sets}</div>
        </div>
      </div>`;
  }).join('');
}

// ===== ACTIONS =====
function updateInitialMax(val) {
  const num = parseInt(val);
  if (!isNaN(num) && num > 0) {
    state.initialMax = num;
    recalcAllEstimates();
    findNextIncomplete();
    saveState();
    render();
    showToast(`최초 측정: ${num}개`);
  } else if (val === '') {
    state.initialMax = null;
    saveState();
    render();
  }
}

function selectWeek(idx) {
  state.weekIdx = idx;
  state.dayIdx = 0;
  const days = getCompletedDays(idx);
  for (let d = 0; d < 3; d++) {
    if (!days.includes(d)) { state.dayIdx = d; break; }
  }
  state.currentSets = [null,null,null,null,null];
  state.currentMemo = '';
  loadCurrentFromHistory();
  saveState();
  render();
}

function selectDay(idx) {
  state.dayIdx = idx;
  state.currentSets = [null,null,null,null,null];
  state.currentMemo = '';
  loadCurrentFromHistory();
  saveState();
  render();
}

function findNextIncomplete() {
  for (let w = 0; w < 6; w++) {
    const days = getCompletedDays(w);
    if (days.length < 3) {
      state.weekIdx = w;
      for (let d = 0; d < 3; d++) {
        if (!days.includes(d)) { state.dayIdx = d; return; }
      }
    }
  }
  state.weekIdx = 0;
  state.dayIdx = 0;
}

function loadCurrentFromHistory() {
  const match = state.history.find(h =>
    h.weekIdx === state.weekIdx && h.dayIdx === state.dayIdx
  );
  if (match) {
    state.currentSets = [...match.sets];
    state.currentMemo = match.memo || '';
  }
}

function toggleSet(idx, target) {
  if (state.currentSets[idx] !== null && state.currentSets[idx] !== 0) {
    state.currentSets[idx] = null;
  } else {
    state.currentSets[idx] = target;
  }
  saveState();
  renderWorkout();
}

function updateSet(idx, val) {
  state.currentSets[idx] = val === '' ? null : parseInt(val);

  // Update input styling without re-rendering the whole grid
  const input = document.querySelectorAll('.set-input')[0];
  if (input) {
    const hasVal = val !== '' && val !== null;
    input.classList.toggle('has-value', hasVal);
  }

  // Show/hide complete button
  const allFilled = state.currentSets.every(v => v !== null && v !== '' && v !== 0);
  const isDayDone = getCompletedDays(state.weekIdx).includes(state.dayIdx);
  document.getElementById('btn-complete').style.display = (allFilled && !isDayDone) ? 'block' : 'none';

  saveState();
}

function saveWorkout() {
  const colIdx = getColIdxForWeek(state.weekIdx);
  if (colIdx < 0) return;

  const phase = getPhase(state.weekIdx);
  const colLabel = PHASE_COLS[phase][colIdx];
  const targets = getDayData(state.weekIdx, state.dayIdx, colIdx);
  const sets = state.currentSets.map((v, i) => {
    if (v !== null && v !== '' && v !== 0) return parseInt(v);
    return 0;
  });
  const total = sets.reduce((a,b) => a+b, 0);
  const memo = document.getElementById('memo').value;
  state.currentMemo = memo;

  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const existIdx = state.history.findIndex(h =>
    h.weekIdx === state.weekIdx && h.dayIdx === state.dayIdx
  );

  const record = {
    date, colIdx, colLabel,
    weekIdx: state.weekIdx, dayIdx: state.dayIdx,
    sets, memo, total,
    completed: getCompletedDays(state.weekIdx).includes(state.dayIdx)
  };

  if (existIdx >= 0) {
    record.completed = state.history[existIdx].completed;
    state.history[existIdx] = record;
  } else {
    state.history.push(record);
  }

  recalcAllEstimates();
  saveState();
  render();
  showToast('저장 완료!');
}

function completeDay() {
  const colIdx = getColIdxForWeek(state.weekIdx);
  const days = getCompletedDays(state.weekIdx);
  if (!days.includes(state.dayIdx)) {
    if (!state.completedDays[state.weekIdx]) state.completedDays[state.weekIdx] = [];
    state.completedDays[state.weekIdx].push(state.dayIdx);

    const existIdx = state.history.findIndex(h =>
      h.weekIdx === state.weekIdx && h.dayIdx === state.dayIdx
    );
    if (existIdx >= 0) {
      state.history[existIdx].completed = true;
    } else {
      saveWorkout();
      const newIdx = state.history.findIndex(h =>
        h.weekIdx === state.weekIdx && h.dayIdx === state.dayIdx
      );
      if (newIdx >= 0) state.history[newIdx].completed = true;
    }

    recalcAllEstimates();

    if (isWeekComplete(state.weekIdx)) {
      const est = getCurrentEstimatedMax();
      showToast(`Week ${state.weekIdx+1} 완료! 추정 Max: ${est}개`);
      if (countCompletedWeeks() < 6) {
        findNextIncomplete();
        state.currentSets = [null,null,null,null,null];
        state.currentMemo = '';
        loadCurrentFromHistory();
      }
    } else {
      const updatedDays = getCompletedDays(state.weekIdx);
      for (let d = 0; d < 3; d++) {
        if (!updatedDays.includes(d)) {
          state.dayIdx = d;
          state.currentSets = [null,null,null,null,null];
          state.currentMemo = '';
          loadCurrentFromHistory();
          break;
        }
      }
      showToast(`${DAY_LABELS[state.dayIdx]} 시작!`);
    }

    saveState();
    render();
  }
}

function exportCSV() {
  if (state.history.length === 0) { showToast('내보낼 기록이 없습니다'); return; }
  const header = 'Date,Column,Week,Day,Set1,Set2,Set3,Set4,Set5(MAX),Total,Memo';
  const rows = state.history.map(h =>
    `"${h.date}","${h.colLabel || ''}","Week ${h.weekIdx+1}","${DAY_LABELS[h.dayIdx]}",${h.sets.join(',')},${h.total},"${(h.memo||'').replace(/"/g,'""')}"`
  );
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pushup100_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV 내보내기 완료');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== INIT =====
render();
</script>
</body>
</html>

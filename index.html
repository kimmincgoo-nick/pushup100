<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Push-Ups Program</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a26;
  --bg4: #22222f;
  --text: #e8e8f0;
  --text2: #9898a8;
  --text3: #606070;
  --accent: #ff6b35;
  --accent2: #ff8c5a;
  --active: #4a8eff;
  --active2: #6aa4ff;
  --done: #2ecc71;
  --done2: #4ae68a;
  --danger: #e74c3c;
  --border: #2a2a3a;
  --border2: #3a3a4a;
  --shadow: rgba(0,0,0,0.4);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 32px 0 24px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 3px;
  background: var(--accent);
  border-radius: 2px;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--active));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.header p {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
}

/* ===== STAT GRID (2x2) ===== */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 24px 0 16px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  text-align: center;
}

.stat-card .label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.stat-card .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 600;
  color: var(--accent);
}

.stat-card .value.blue { color: var(--active); }
.stat-card .value.green { color: var(--done); }

.stat-card .sub-text {
  font-size: 12px;
  color: var(--done);
  margin-top: 4px;
  font-weight: 600;
}

.stat-card .sub-text.none {
  color: var(--text3);
  font-weight: 400;
}

/* ===== INITIAL MAX INPUT ===== */
.initial-input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 600;
  background: transparent;
  border: none;
  border-bottom: 2px dashed var(--border2);
  color: var(--active);
  text-align: center;
  width: 70px;
  outline: none;
  padding: 2px 0;
  -moz-appearance: textfield;
  transition: border-color 0.2s;
}
.initial-input:focus {
  border-bottom-color: var(--active);
  border-bottom-style: solid;
}
.initial-input::-webkit-inner-spin-button,
.initial-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.initial-input::placeholder { color: var(--text3); font-size: 16px; }

/* ===== PROGRESS ===== */
.progress-wrap {
  margin: 0 0 24px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.progress-wrap .label {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--bg4);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--done));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* ===== SECTION TITLE ===== */
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ===== WEEK TABS ===== */
.week-tabs {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}

.week-tab {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 4px;
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.week-tab:hover { border-color: var(--active); color: var(--text); }
.week-tab.active { background: var(--active); border-color: var(--active); color: #fff; }
.week-tab.done { background: rgba(46,204,113,0.15); border-color: var(--done); color: var(--done); }
.week-tab.done.active { background: var(--done); color: #fff; }

/* ===== DAY TABS ===== */
.day-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.day-tab {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.day-tab:hover { border-color: var(--active); color: var(--text); }
.day-tab.active { background: var(--active); border-color: var(--active); color: #fff; }
.day-tab.done { background: rgba(46,204,113,0.15); border-color: var(--done); color: var(--done); }
.day-tab.done.active { background: var(--done); color: #fff; }

/* ===== WORKOUT CARD ===== */
.workout-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}

.workout-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.workout-title {
  font-size: 16px;
  font-weight: 600;
}

.rest-badge {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg4);
  padding: 4px 10px;
  border-radius: 20px;
}

.sets-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.set-item { text-align: center; }

.set-label {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
  font-weight: 500;
}

.set-target {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
}

.set-target.max-label {
  color: var(--danger);
  font-size: 14px;
}

.set-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 4px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  text-align: center;
  outline: none;
  transition: all 0.2s;
}

.set-input:focus { border-color: var(--active); box-shadow: 0 0 0 3px rgba(74,142,255,0.15); }
.set-input.hit { border-color: var(--done); background: rgba(46,204,113,0.08); color: var(--done); }
.set-input.miss { border-color: var(--danger); background: rgba(231,76,60,0.08); color: var(--danger); }

.set-input::placeholder { color: var(--text3); font-size: 12px; }
.set-input::-webkit-inner-spin-button,
.set-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.set-input { -moz-appearance: textfield; }

/* ===== MEMO ===== */
.memo-area {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  resize: vertical;
  min-height: 60px;
  outline: none;
  transition: border-color 0.2s;
}

.memo-area:focus { border-color: var(--active); }
.memo-area::placeholder { color: var(--text3); }

/* ===== BUTTONS ===== */
.btn-row { display: flex; gap: 10px; margin-top: 16px; }

.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg4); color: var(--text); }
.btn-done { background: var(--done); color: #fff; }
.btn-sm { padding: 10px 16px; font-size: 13px; flex: unset; }

/* ===== HISTORY ===== */
.history-section { margin-top: 32px; }

.history-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}

.history-item .date { color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.history-item .info { color: var(--text2); }
.history-item .info strong { color: var(--text); }
.history-item .total { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

/* ===== FOOTER ===== */
.footer-actions { margin-top: 24px; display: flex; gap: 10px; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--done); color: #fff;
  padding: 12px 24px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; z-index: 999;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 24px rgba(46,204,113,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; max-width: 400px; width: 100%;
}
.modal h3 { font-size: 18px; margin-bottom: 12px; }
.modal p { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }

/* ===== ONBOARDING ===== */
.onboard-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 1001; display: none; align-items: center; justify-content: center; padding: 20px;
}
.onboard-overlay.open { display: flex; }
.onboard-card {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 32px 24px; max-width: 380px; width: 100%; text-align: center;
}
.onboard-card h2 {
  font-size: 20px; font-weight: 700; margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent), var(--active));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.onboard-card p { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
.onboard-input {
  font-family: 'JetBrains Mono', monospace; font-size: 40px; font-weight: 700;
  background: var(--bg); border: 2px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--accent); text-align: center; width: 140px; padding: 12px; outline: none;
  -moz-appearance: textfield;
}
.onboard-input:focus { border-color: var(--active); }
.onboard-input::-webkit-inner-spin-button,
.onboard-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.onboard-unit { font-size: 18px; color: var(--text2); margin-left: 8px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .sets-grid { gap: 6px; }
  .set-input { padding: 8px 2px; font-size: 14px; }
  .set-target { font-size: 16px; }
  .stat-grid { gap: 6px; }
  .stat-card { padding: 12px 10px; }
  .stat-card .value { font-size: 20px; }
  .initial-input { font-size: 20px; width: 60px; }
}
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <h1>100 Push-Ups</h1>
    <p>USNA 6-Week Program by CAPT Mike Prevost, USN</p>
  </div>

  <!-- Stat Grid 2x2 -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="label">진행 주차</div>
      <div class="value blue" id="stat-week">0/6</div>
    </div>
    <div class="stat-card">
      <div class="label">누적 푸쉬업</div>
      <div class="value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="label">최초 측정</div>
      <div id="initial-display">
        <input type="number" class="initial-input" id="initial-input"
          placeholder="?" min="0" inputmode="numeric"
          onchange="updateInitialMax(this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">
        <span style="font-size:13px;color:var(--text3)">개</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="label">추정 최대</div>
      <div class="value green" id="stat-estimated">-</div>
      <div class="sub-text none" id="stat-delta"></div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="label">
      <span>6주 프로그램 진행률</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Week Tabs -->
  <div class="section-title">주차 선택</div>
  <div class="week-tabs" id="week-tabs"></div>

  <!-- Day Tabs -->
  <div class="day-tabs" id="day-tabs"></div>

  <!-- Workout Card -->
  <div class="workout-card" id="workout-card" style="display:none;">
    <div class="workout-header">
      <div class="workout-title" id="workout-title">Week 1 · Day 1</div>
      <div class="rest-badge">세트 간 휴식 30-60초</div>
    </div>
    <div class="sets-grid" id="sets-grid"></div>
    <textarea class="memo-area" id="memo" placeholder="오늘의 컨디션, 특이사항 메모..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-save" onclick="saveWorkout()">저장</button>
      <button class="btn btn-done" id="btn-complete" onclick="completeDay()" style="display:none;">Day 완료</button>
    </div>
  </div>

  <!-- No Initial Max -->
  <div class="empty-state" id="empty-state">
    최초 측정 푸쉬업 개수를 입력하면 프로그램이 시작됩니다
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>기록</span>
      <button class="btn btn-secondary btn-sm" onclick="exportCSV()">CSV 내보내기</button>
    </div>
    <div id="history-list" style="margin-top:12px;"></div>
  </div>

  <!-- Footer -->
  <div class="footer-actions">
    <button class="btn btn-secondary" onclick="showResetModal()">초기화</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Reset Modal -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <h3>데이터 초기화</h3>
    <p>모든 진행 상황과 기록이 삭제됩니다. 정말 초기화할까요?</p>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeResetModal()">취소</button>
      <button class="btn btn-primary" style="background:var(--danger);" onclick="resetAll()">초기화</button>
    </div>
  </div>
</div>

<script>
// ===== PROGRAM DATA =====
const COLUMNS = ['< 6','6-10','11-20','21-25','26-35','36-50','50-75','75-100','> 100'];
const COL_BOUNDS = [[0,5],[6,10],[11,20],[21,25],[26,35],[36,50],[51,75],[76,100],[101,999]];

const PROGRAM = [
  [[2,6,10,12,14,25,35,45,55],[3,6,12,17,18,30,40,55,65],[2,4,7,13,14,25,30,35,35],[2,4,7,13,14,25,24,30,30],null],
  [[3,6,10,13,15,26,36,46,56],[4,8,12,18,19,31,41,56,66],[2,6,8,14,15,26,31,36,36],[3,6,8,14,15,26,25,31,31],null],
  [[4,8,11,14,16,27,37,47,57],[5,10,15,19,20,32,42,57,67],[4,7,9,15,16,27,32,37,37],[4,7,9,15,16,27,26,32,32],null],
  [[4,8,12,15,17,28,38,48,58],[6,10,15,20,21,33,43,58,68],[5,8,10,16,17,28,33,38,38],[4,8,10,16,17,28,27,33,33],null],
  [[5,8,12,16,18,29,39,49,59],[7,11,16,21,22,34,44,59,69],[5,8,10,17,18,29,34,39,39],[4,8,10,17,18,29,28,34,34],null],
  [[5,8,12,17,19,30,40,50,60],[8,12,17,22,23,35,45,60,70],[6,8,11,18,19,30,35,40,40],[5,8,10,18,19,30,29,35,35],null]
];

const DAY_LABELS = ['Day 1', 'Day 2', 'Day 3'];

// ===== STATE =====
let state = loadState();

function defaultState() {
  return {
    initialMax: null,   // user's initial test result
    weekIdx: 0,
    dayIdx: 0,
    completedDays: {},
    completedColumns: [],
    history: [],
    currentSets: [null,null,null,null,null],
    currentMemo: '',
    weekEstimates: {}
  };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('pushup100_v3'));
    if (s && s.history !== undefined) {
      if (!s.weekEstimates) s.weekEstimates = {};
      if (s.initialMax === undefined) s.initialMax = null;
      return s;
    }
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem('pushup100_v3', JSON.stringify(state));
}

function getCompletedDays(weekIdx) {
  return state.completedDays[weekIdx] || [];
}

function isWeekComplete(weekIdx) {
  return getCompletedDays(weekIdx).length >= 3;
}

function countCompletedWeeks() {
  let count = 0;
  for (let w = 0; w < 6; w++) {
    if (isWeekComplete(w)) count++;
  }
  return count;
}

// ===== ESTIMATION =====
function estimateFromSets(sets) {
  if (!sets || sets.length < 5) return null;
  const s5 = sets[4];
  const priorVol = sets[0] + sets[1] + sets[2] + sets[3];
  if (s5 === 0 && priorVol === 0) return null;
  return Math.round(s5 + priorVol * 0.3);
}

function calcWeekEstimate(weekIdx) {
  if (!isWeekComplete(weekIdx)) return null;
  const colIdx = getColIdxForWeek(weekIdx);
  const weekHistory = state.history.filter(h =>
    h.weekIdx === weekIdx && h.completed && h.colIdx === colIdx
  );
  if (weekHistory.length < 3) return null;
  let maxEst = 0;
  for (const h of weekHistory) {
    const est = estimateFromSets(h.sets);
    if (est !== null && est > maxEst) maxEst = est;
  }
  return maxEst > 0 ? maxEst : null;
}

function recalcAllEstimates() {
  for (let w = 0; w < 6; w++) {
    if (isWeekComplete(w)) {
      const est = calcWeekEstimate(w);
      if (est !== null) state.weekEstimates[w] = est;
    }
  }
}

// Get estimated max: monotonically increasing, floored by initialMax
function getCurrentEstimatedMax() {
  if (state.initialMax === null) return null;
  let runningMax = state.initialMax;
  for (let w = 0; w < 6; w++) {
    const est = state.weekEstimates[w];
    if (est !== undefined && est > runningMax) runningMax = est;
  }
  return runningMax;
}

// Get the effective max for a specific week (for column assignment)
function getMaxForWeek(weekIdx) {
  if (state.initialMax === null) return null;
  let runningMax = state.initialMax;
  // Use estimates from weeks BEFORE this one
  for (let w = 0; w < weekIdx; w++) {
    const est = state.weekEstimates[w];
    if (est !== undefined && est > runningMax) runningMax = est;
  }
  return runningMax;
}

// Map max to column index
function maxToColIdx(max) {
  if (max === null) return -1;
  for (let i = 0; i < COL_BOUNDS.length; i++) {
    if (max >= COL_BOUNDS[i][0] && max <= COL_BOUNDS[i][1]) return i;
  }
  return 8;
}

// Get column index for a specific week
function getColIdxForWeek(weekIdx) {
  return maxToColIdx(getMaxForWeek(weekIdx));
}

// Get current column index (for active week)
function getCurrentColIdx() {
  return getColIdxForWeek(state.weekIdx);
}

// ===== RENDER =====
function render() {
  renderStats();
  renderWeekTabs();
  renderDayTabs();
  renderWorkout();
  renderProgress();
  renderHistory();
}

function renderStats() {
  // Week progress
  document.getElementById('stat-week').textContent = `${countCompletedWeeks()}/6`;

  // Total pushups
  const totalPushups = state.history.reduce((sum, h) => sum + (h.total || 0), 0);
  document.getElementById('stat-total').textContent = totalPushups.toLocaleString();

  // Initial max input
  const input = document.getElementById('initial-input');
  if (state.initialMax !== null && input !== document.activeElement) {
    input.value = state.initialMax;
  }

  // Estimated max
  const estEl = document.getElementById('stat-estimated');
  const deltaEl = document.getElementById('stat-delta');
  const estimated = getCurrentEstimatedMax();

  if (estimated !== null) {
    estEl.textContent = estimated;

    if (state.initialMax !== null && estimated > state.initialMax) {
      const delta = estimated - state.initialMax;
      deltaEl.className = 'sub-text';
      deltaEl.textContent = `최초 대비 +${delta}개`;
    } else {
      deltaEl.className = 'sub-text none';
      deltaEl.textContent = '최초 측정과 동일';
    }
  } else {
    estEl.textContent = '-';
    deltaEl.className = 'sub-text none';
    deltaEl.textContent = '';
  }
}

function renderWeekTabs() {
  const el = document.getElementById('week-tabs');
  if (state.initialMax === null) { el.innerHTML = ''; return; }

  el.innerHTML = Array.from({length:6}, (_, i) => {
    let cls = 'week-tab';
    if (isWeekComplete(i)) cls += ' done';
    if (i === state.weekIdx) cls += ' active';
    const colIdx = getColIdxForWeek(i);
    const colLabel = colIdx >= 0 ? COLUMNS[colIdx] : '';
    return `<button class="${cls}" onclick="selectWeek(${i})">
      <div>W${i+1}</div>
      <div style="font-size:10px;opacity:0.7;margin-top:2px">${colLabel}</div>
    </button>`;
  }).join('');
}

function renderDayTabs() {
  const el = document.getElementById('day-tabs');
  if (state.initialMax === null) { el.innerHTML = ''; return; }
  const days = getCompletedDays(state.weekIdx);
  el.innerHTML = DAY_LABELS.map((label, i) => {
    let cls = 'day-tab';
    if (days.includes(i)) cls += ' done';
    if (i === state.dayIdx) cls += ' active';
    return `<button class="${cls}" onclick="selectDay(${i})">${label}</button>`;
  }).join('');
}

function renderWorkout() {
  const card = document.getElementById('workout-card');
  const empty = document.getElementById('empty-state');
  const colIdx = getCurrentColIdx();

  if (state.initialMax === null || colIdx < 0) {
    card.style.display = 'none';
    empty.style.display = 'block';
    empty.textContent = state.initialMax === null
      ? '최초 측정 푸쉬업 개수를 입력하면 프로그램이 시작됩니다'
      : '데이터를 불러오는 중...';
    return;
  }
  card.style.display = 'block';
  empty.style.display = 'none';

  document.getElementById('workout-title').textContent =
    `Week ${state.weekIdx+1} · ${DAY_LABELS[state.dayIdx]} · ${COLUMNS[colIdx]}`;

  const week = PROGRAM[state.weekIdx];
  const grid = document.getElementById('sets-grid');

  grid.innerHTML = Array.from({length: 5}, (_, s) => {
    const isMax = week[s] === null;
    const target = isMax ? null : week[s][colIdx];
    const val = state.currentSets[s];
    const valNum = val !== null && val !== '' ? parseInt(val) : null;

    let inputCls = 'set-input';
    if (valNum !== null && !isMax && target !== null) {
      inputCls += valNum >= target ? ' hit' : ' miss';
    }

    return `
      <div class="set-item">
        <div class="set-label">Set ${s+1}</div>
        <div class="set-target ${isMax ? 'max-label' : ''}">${isMax ? 'MAX' : target}</div>
        <input type="number" class="${inputCls}"
          value="${val !== null && val !== '' ? val : ''}"
          placeholder="${isMax ? 'MAX' : target}"
          min="0" inputmode="numeric"
          oninput="updateSet(${s}, this.value)">
      </div>`;
  }).join('');

  document.getElementById('memo').value = state.currentMemo || '';

  const allFilled = state.currentSets.every(v => v !== null && v !== '');
  const isDone = getCompletedDays(state.weekIdx).includes(state.dayIdx);
  document.getElementById('btn-complete').style.display = (allFilled && !isDone) ? 'block' : 'none';
  document.getElementById('btn-save').textContent = isDone ? '수정 저장' : '저장';
}

function renderProgress() {
  let totalCompletedDays = 0;
  for (let w = 0; w < 6; w++) {
    totalCompletedDays += getCompletedDays(w).length;
  }
  const pct = Math.min(100, Math.round(totalCompletedDays / 18 * 100));
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (state.history.length === 0) {
    el.innerHTML = '<div class="empty-state">아직 기록이 없습니다</div>';
    return;
  }
  el.innerHTML = [...state.history].reverse().slice(0, 20).map(h => {
    const sets = h.sets.map((v,i) => i === 4 ? `<strong style="color:var(--danger)">${v}</strong>` : v).join(' · ');
    return `
      <div class="history-item">
        <div>
          <div class="info"><strong>${COLUMNS[h.colIdx]}</strong> · W${h.weekIdx+1} ${DAY_LABELS[h.dayIdx]}</div>
          <div class="date">${h.date}</div>
        </div>
        <div style="text-align:right">
          <div class="total">${h.total}회</div>
          <div style="font-size:11px;color:var(--text3)">${sets}</div>
        </div>
      </div>`;
  }).join('');
}

// ===== ACTIONS =====
function updateInitialMax(val) {
  const num = parseInt(val);
  if (!isNaN(num) && num > 0) {
    state.initialMax = num;
    recalcAllEstimates();
    findNextIncomplete();
    saveState();
    render();
    showToast(`최초 측정: ${num}개`);
  } else if (val === '') {
    state.initialMax = null;
    saveState();
    render();
  }
}

function selectWeek(idx) {
  state.weekIdx = idx;
  state.dayIdx = 0;
  const days = getCompletedDays(idx);
  for (let d = 0; d < 3; d++) {
    if (!days.includes(d)) { state.dayIdx = d; break; }
  }
  state.currentSets = [null,null,null,null,null];
  state.currentMemo = '';
  loadCurrentFromHistory();
  saveState();
  render();
}

function selectDay(idx) {
  state.dayIdx = idx;
  state.currentSets = [null,null,null,null,null];
  state.currentMemo = '';
  loadCurrentFromHistory();
  saveState();
  render();
}

function findNextIncomplete() {
  for (let w = 0; w < 6; w++) {
    const days = getCompletedDays(w);
    if (days.length < 3) {
      state.weekIdx = w;
      for (let d = 0; d < 3; d++) {
        if (!days.includes(d)) { state.dayIdx = d; return; }
      }
    }
  }
  state.weekIdx = 0;
  state.dayIdx = 0;
}

function loadCurrentFromHistory() {
  const colIdx = getCurrentColIdx();
  const match = state.history.find(h =>
    h.colIdx === colIdx && h.weekIdx === state.weekIdx && h.dayIdx === state.dayIdx
  );
  if (match) {
    state.currentSets = [...match.sets];
    state.currentMemo = match.memo || '';
  }
}

function updateSet(idx, val) {
  state.currentSets[idx] = val === '' ? null : parseInt(val);

  const colIdx = getCurrentColIdx();
  const week = PROGRAM[state.weekIdx];
  const isMax = week[idx] === null;
  const target = isMax ? null : week[idx][colIdx];
  const input = document.querySelectorAll('.set-input')[idx];
  const valNum = val === '' ? null : parseInt(val);

  input.className = 'set-input';
  if (valNum !== null && !isMax && target !== null) {
    input.classList.add(valNum >= target ? 'hit' : 'miss');
  }

  const allFilled = state.currentSets.every(v => v !== null && v !== '');
  const isDone = getCompletedDays(state.weekIdx).includes(state.dayIdx);
  document.getElementById('btn-complete').style.display = (allFilled && !isDone) ? 'block' : 'none';

  saveState();
}

function saveWorkout() {
  const colIdx = getCurrentColIdx();
  if (colIdx < 0) return;

  const sets = state.currentSets.map(v => (v !== null && v !== '') ? parseInt(v) : 0);
  const total = sets.reduce((a,b) => a+b, 0);
  const memo = document.getElementById('memo').value;
  state.currentMemo = memo;

  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const existIdx = state.history.findIndex(h =>
    h.colIdx === colIdx && h.weekIdx === state.weekIdx && h.dayIdx === state.dayIdx
  );

  const record = {
    date, colIdx,
    weekIdx: state.weekIdx, dayIdx: state.dayIdx,
    sets, memo, total,
    completed: getCompletedDays(state.weekIdx).includes(state.dayIdx)
  };

  if (existIdx >= 0) {
    record.completed = state.history[existIdx].completed;
    state.history[existIdx] = record;
  } else {
    state.history.push(record);
  }

  recalcAllEstimates();
  saveState();
  render();
  showToast('저장 완료!');
}

function completeDay() {
  const colIdx = getCurrentColIdx();
  const days = getCompletedDays(state.weekIdx);
  if (!days.includes(state.dayIdx)) {
    if (!state.completedDays[state.weekIdx]) state.completedDays[state.weekIdx] = [];
    state.completedDays[state.weekIdx].push(state.dayIdx);

    const existIdx = state.history.findIndex(h =>
      h.colIdx === colIdx && h.weekIdx === state.weekIdx && h.dayIdx === state.dayIdx
    );
    if (existIdx >= 0) {
      state.history[existIdx].completed = true;
    } else {
      saveWorkout();
      const newIdx = state.history.findIndex(h =>
        h.colIdx === colIdx && h.weekIdx === state.weekIdx && h.dayIdx === state.dayIdx
      );
      if (newIdx >= 0) state.history[newIdx].completed = true;
    }

    recalcAllEstimates();

    if (isWeekComplete(state.weekIdx)) {
      const est = getCurrentEstimatedMax();
      if (countCompletedWeeks() >= 6) {
        showToast(`6주 프로그램 완료! 추정 Max: ${est}개`);
      } else {
        showToast(`Week ${state.weekIdx+1} 완료! 추정 Max: ${est}개`);
        findNextIncomplete();
        state.currentSets = [null,null,null,null,null];
        state.currentMemo = '';
        loadCurrentFromHistory();
      }
    } else {
      const updatedDays = getCompletedDays(state.weekIdx);
      for (let d = 0; d < 3; d++) {
        if (!updatedDays.includes(d)) {
          state.dayIdx = d;
          state.currentSets = [null,null,null,null,null];
          state.currentMemo = '';
          loadCurrentFromHistory();
          break;
        }
      }
      showToast(`${DAY_LABELS[state.dayIdx]} 시작!`);
    }

    saveState();
    render();
  }
}

function exportCSV() {
  if (state.history.length === 0) { showToast('내보낼 기록이 없습니다'); return; }
  const header = 'Date,Column,Week,Day,Set1,Set2,Set3,Set4,Set5(MAX),Total,Memo';
  const rows = state.history.map(h =>
    `"${h.date}","${COLUMNS[h.colIdx]}","Week ${h.weekIdx+1}","${DAY_LABELS[h.dayIdx]}",${h.sets.join(',')},${h.total},"${(h.memo||'').replace(/"/g,'""')}"`
  );
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pushup100_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV 내보내기 완료');
}

function showResetModal() { document.getElementById('reset-modal').classList.add('open'); }
function closeResetModal() { document.getElementById('reset-modal').classList.remove('open'); }

function resetAll() {
  state = defaultState();
  saveState();
  closeResetModal();
  document.getElementById('initial-input').value = '';
  render();
  showToast('초기화 완료');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== INIT =====
render();
</script>
</body>
</html>
